name: Agency Bot — Instant Telegram Command

on:
  repository_dispatch:
    types: [telegram_message]

jobs:
  handle-message:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: telegram-instant
      cancel-in-progress: false

    permissions:
      contents: write   # commit CRM state changes (notes, close, lost, etc.)
      actions: write     # lets /find trigger the scraper workflow on demand

    env:
      GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
      GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
      GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Handle Telegram message instantly
        run: python webhook_handler.py

      # ── Persist any CRM state changes back to GitHub repository ──
      - name: Save tracking files to repo
        if: always()
        run: |
          git config user.name  "Agency Bot"
          git config user.email "bot@agency-bot.local"
          git add -f replied_log.csv conversations.json agency_log.txt telegram_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "bot: instant command update [skip ci]"
          git push || echo "Nothing to push"
