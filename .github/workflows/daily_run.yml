name: Agency Bot — Daily Lead Run

on:
  schedule:
    # 9:00 AM IST every day (IST = UTC+5:30, so 3:30 AM UTC)
    - cron: '30 3 * * *'
  workflow_dispatch:
    # Trigger manually from GitHub with one click

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 2-hour safety cap (1 city run = ~30-45 min)

    permissions:
      contents: write   # needed to commit tracking files back to repo

    env:
      GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
      GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
      WHATSAPP_TOKEN:      ${{ secrets.WHATSAPP_TOKEN }}
      WHATSAPP_PHONE_ID:   ${{ secrets.WHATSAPP_PHONE_ID }}
      BLAND_API_KEY:       ${{ secrets.BLAND_API_KEY }}
      TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
      TWILIO_ACCOUNT_SID:  ${{ secrets.TWILIO_ACCOUNT_SID }}
      TWILIO_AUTH_TOKEN:   ${{ secrets.TWILIO_AUTH_TOKEN }}
      TWILIO_FROM_NUMBER:  ${{ secrets.TWILIO_FROM_NUMBER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run Agency Bot
        run: python main.py

      # ── Persist tracking files so they survive between runs ──
      # Without this, leads.csv / sent_log.csv / conversations.json
      # are deleted when the runner shuts down. The bot would email
      # the same businesses every day. [skip ci] prevents a loop.
      - name: Save tracking files to repo
        if: always()
        run: |
          git config user.name  "Agency Bot"
          git config user.email "bot@agency-bot.local"
          git add -f leads.csv sent_log.csv replied_log.csv conversations.json agency_log.txt whatsapp_log.csv call_log.csv calls_log.csv telegram_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "bot: update tracking files [skip ci]"
          git push || echo "Nothing to push"

      # ── Also upload as downloadable artifacts ──
      - name: Download leads CSV
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: leads-${{ github.run_id }}
          path: leads.csv
          if-no-files-found: ignore

      - name: Download sent log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sent-log-${{ github.run_id }}
          path: sent_log.csv
          if-no-files-found: ignore

      - name: Download conversations log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conversations-${{ github.run_id }}
          path: conversations.json
          if-no-files-found: ignore
